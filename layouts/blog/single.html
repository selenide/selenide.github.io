{{ define "main" }}

{{ partial "donate.html" . }}

<div class="short blog_post_header">
  <div class="wrapper-color-content">
    <h4>{{ .Title }}</h4>
    {{ .Params.headerText | safeHTML }}
    <h6>{{ .Date.Format "02.01.06" }}</h6>
  </div>
</div>

<div class="wrapper-content blog_post">
  <section>
    <div class="blog_post_content">
      {{ .Content }}

      <p>{{ .Date.Format "02.01.06" }}</p>
    </div>
  </section>
</div>

{{ end }}
